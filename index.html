<body class="bg-surface text-on-surface h-screen flex flex-col font-body-lg overflow-hidden touch-none select-none">

<header class="bg-surface font-headline-lg docked full-width top-0 border-b-4 border-surface-container-highest shadow-[0_4px_0_0_rgba(0,0,0,0.3)] flex justify-between items-center px-safe-margin h-[72px] w-full z-10 shrink-0 relative">
    <div class="flex-none w-[100px] flex justify-start">
        <button class="text-primary hover:opacity-80 active:translate-y-0.5 transition-all p-xs flex items-center justify-center">
            <span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">menu</span>
        </button>
    </div>
    <div class="flex-1 flex justify-center whitespace-nowrap">
        <h1 id="level-title" class="font-display-lg text-[24px] uppercase text-primary tracking-tighter">LEVEL 1</h1>
    </div>
    <div class="flex-none w-[160px] flex justify-end items-center gap-xs">
        <div class="bg-surface-container-high px-sm py-1 rounded-lg border-b-2 border-surface-container-highest flex items-center gap-1">
            <span class="text-[10px] font-label-bold text-outline uppercase hidden sm:inline">Lives</span>
            <div class="flex items-center text-error">
                <span id="lives-count" class="font-jetbrains-mono text-[16px] font-bold mr-0.5">5</span>
                <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
            </div>
        </div>
        <div class="bg-surface-container-high px-sm py-1 rounded-lg border-b-2 border-surface-container-highest flex items-center gap-1">
            <span class="text-[10px] font-label-bold text-outline uppercase hidden sm:inline">Left</span>
            <span id="timer" class="font-jetbrains-mono text-[16px] text-primary font-bold">02:00</span>
        </div>
    </div>
</header>

<main class="flex-1 flex flex-col items-center p-safe-margin overflow-y-auto w-full max-w-md mx-auto">
    <div class="bg-surface-container rounded-2xl border-4 border-surface-container-highest shadow-lg flex flex-col overflow-hidden relative h-[400px] w-[320px] my-auto">
        <div id="upper-zone" class="h-1/2 w-full p-md flex flex-wrap content-center justify-center gap-md relative border-surface-container-highest bg-gradient-to-b from-surface-container-low to-transparent border-b-2">
            </div>
        <div class="w-full h-1 bg-surface-container-highest relative flex items-center justify-center">
            <div class="absolute w-full h-px bg-primary/30 blur-[2px]"></div>
        </div>
        <div id="lower-zone" class="h-1/2 w-full p-md flex flex-wrap content-center justify-center gap-md relative bg-gradient-to-t from-surface-container-low to-transparent border-t-2">
            </div>
    </div>

    <div class="w-full bg-surface-container-high rounded-xl p-sm border-2 border-surface-container-highest shadow-inner mb-sm mt-lg">
        <div id="inventory-tray" class="flex justify-center gap-gutter items-center min-h-[64px]">
            </div>
    </div>
</main>

<div class="w-full h-[60px] bg-surface-container-lowest border-t border-surface-container-highest flex items-center justify-center shrink-0 z-20">
    <div class="w-full max-w-[320px] h-[50px] bg-surface-variant rounded flex items-center justify-center text-on-surface-variant font-label-md uppercase tracking-wider border border-outline-variant border-dashed">
        Advertisement Placeholder
    </div>
</div>

<script>
/**
 * THE EQUILIBRIUM PROTOCOL - Game Engine
 * Logic added to support dynamic gameplay while keeping the UI identical.
 */

class GameEngine {
    constructor() {
        this.level = 1;
        this.lives = 5;
        this.timeLeft = 120;
        this.timerInterval = null;
        this.upperSum = 0;
        this.lowerSum = 0;
        this.pieces = [];
        this.placedCount = 0;
        this.colors = ['#f97316', '#ec4899', '#14b8a6', '#84cc16', '#a855f7', '#3b82f6', '#eab308', '#ef4444'];
        
        this.init();
    }

    init() {
        this.setupTimer();
        this.startLevel();
    }

    setupTimer() {
        if (this.timerInterval) clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => {
            this.timeLeft--;
            const mins = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
            const secs = (this.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
            if (this.timeLeft <= 0) this.handleGameOver("Time Up!");
        }, 1000);
    }

    startLevel() {
        this.upperSum = 0;
        this.lowerSum = 0;
        this.placedCount = 0;
        document.getElementById('upper-zone').innerHTML = '';
        document.getElementById('lower-zone').innerHTML = '';
        document.getElementById('level-title').innerText = `LEVEL ${this.level}`;
        document.getElementById('lives-count').innerText = this.lives;

        // Difficulty Math Logic
        const target = 10 + (this.level * 5);
        this.generatePuzzle(target);
    }

    generatePuzzle(target) {
        // Simple decomposition for 4 pieces
        let p1 = Math.floor(Math.random() * (target - 5)) + 2;
        let p2 = target - p1;
        let p3 = Math.floor(Math.random() * (target - 5)) + 2;
        let p4 = target - p3;

        this.pieces = [p1, p2, p3, p4].sort(() => Math.random() - 0.5);
        this.renderTray();
    }

    renderTray() {
        const tray = document.getElementById('inventory-tray');
        tray.innerHTML = '';
        this.pieces.forEach((val, idx) => {
            const color = this.colors[Math.floor(Math.random() * this.colors.length)];
            const tile = document.createElement('div');
            // Using existing classes from provided UI
            tile.className = `w-16 h-16 rounded-xl text-white flex flex-col items-center justify-center font-display-lg text-[28px] tile-3d cursor-grab relative group`;
            tile.style.backgroundColor = color;
            tile.innerHTML = `<span>${val}</span>`;
            tile.dataset.value = val;
            
            this.addSwipeSupport(tile);
            tray.appendChild(tile);
        });
    }

    addSwipeSupport(el) {
        let startY = 0;
        el.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, {passive: true});
        el.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            const diff = startY - endY;
            const threshold = 50;

            if (diff > threshold) this.moveTile(el, 'upper');
            else if (diff < -threshold) this.moveTile(el, 'lower');
        });
    }

    moveTile(el, zoneId) {
        const val = parseInt(el.dataset.value);
        const targetZone = document.getElementById(`${zoneId}-zone`);
        
        // UI Adjustment to match zone tile size
        el.className = el.className.replace('w-16 h-16', 'w-20 h-20').replace('text-[28px]', 'text-[32px]');
        el.style.position = 'relative';
        
        targetZone.appendChild(el);
        if (zoneId === 'upper') this.upperSum += val;
        else this.lowerSum += val;

        this.placedCount++;
        if (this.placedCount === 4) this.checkResult();
    }

    checkResult() {
        setTimeout(() => {
            if (this.upperSum === this.lowerSum) {
                this.level++;
                alert("Perfect Equilibrium!");
                this.startLevel();
            } else {
                this.lives--;
                alert(`Imbalance! Upper: ${this.upperSum} vs Lower: ${this.lowerSum}`);
                if (this.lives <= 0) this.handleGameOver("No Lives Left");
                else this.startLevel();
            }
        }, 300);
    }

    handleGameOver(reason) {
        alert(`Game Over: ${reason}. Restarting...`);
        this.level = 1;
        this.lives = 5;
        this.timeLeft = 120;
        this.startLevel();
    }
}

// Global initialization
window.addEventListener('DOMContentLoaded', () => {
    new GameEngine();
});
</script>
