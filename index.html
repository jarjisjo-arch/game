    <style>
        .inner-glow { box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2); }
        .tactile-shadow { box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3), 0 8px 16px rgba(0, 0, 0, 0.2); }
        .tile-shadow { box-shadow: 0 4px 0 rgba(0, 0, 0, 0.4), 0 8px 12px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.2); }
        .recessed-tray { box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5), inset 0 -2px 4px rgba(255, 255, 255, 0.05); }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container touch-none">

<header class="bg-surface/80 backdrop-blur-md flex justify-between items-center px-container-margin h-20 w-full border-b border-outline-variant/10 shadow-sm sticky top-0 z-50">
    <div class="flex items-center gap-stack-md">
        <span class="material-symbols-outlined text-primary" data-icon="grid_view">grid_view</span>
        <h1 class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight">Equal Blocks</h1>
    </div>
    <div class="flex items-center gap-stack-md font-label-caps text-label-caps text-on-surface-variant">
        <span id="lv-display">Lv. 1</span>
    </div>
</header>

<main class="flex-1 flex flex-col px-container-margin py-stack-md gap-stack-md w-full max-w-md mx-auto">
    <!-- Status Bar -->
    <div class="flex justify-between items-center bg-surface-container-high rounded-xl p-grid-padding shadow-sm border border-outline-variant/20 inner-glow">
        <div id="hearts-container" class="flex gap-stack-sm text-secondary">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
        </div>
        <div id="timer-display" class="font-display-number text-[32px] leading-tight text-on-surface font-mono tracking-widest">
            01:00
        </div>
    </div>

    <!-- Game Board -->
    <div class="flex-1 bg-surface-container rounded-3xl p-grid-padding recessed-tray border border-outline-variant/30 flex flex-col gap-stack-md relative min-h-[400px]">
        <!-- Upper Section -->
        <div id="upper-zone" class="flex-1 flex flex-wrap justify-center content-center gap-tile-gap bg-surface-container-low rounded-xl border border-outline-variant/10 p-grid-padding min-h-[150px]">
        </div>
        
        <!-- Divider -->
        <div class="flex items-center w-full px-grid-padding opacity-50">
            <div class="h-px flex-1 bg-outline-variant"></div>
            <span class="material-symbols-outlined text-outline-variant mx-stack-sm">unfold_more</span>
            <div class="h-px flex-1 bg-outline-variant"></div>
        </div>

        <!-- Lower Section -->
        <div id="lower-zone" class="flex-1 flex flex-wrap justify-center content-center gap-tile-gap bg-surface-container-low rounded-xl border border-outline-variant/10 p-grid-padding border-dashed min-h-[150px]">
        </div>
    </div>

    <!-- Tray -->
    <div class="rounded-xl p-grid-padding mt-2">
        <div id="tray-container" class="flex justify-center gap-tile-gap overflow-x-auto pb-stack-sm hide-scrollbar">
        </div>
    </div>
</main>

<div class="w-full bg-surface-container-lowest border-t border-outline-variant/20 p-stack-md flex justify-center mt-auto">
    <div class="w-[320px] h-[50px] bg-surface border border-dashed border-outline-variant flex items-center justify-center rounded text-outline font-label-caps text-label-caps">
        Ad
    </div>
</div>

<script>
/**
 * BACKEND LOGIC FOR EQUAL BLOCKS
 */
class EqualBlocksEngine {
    constructor() {
        this.lv = 1;
        this.lives = 3;
        this.timeLeft = 60;
        this.upperSum = 0;
        this.lowerSum = 0;
        this.placedCount = 0;
        this.timer = null;
        
        this.init();
    }

    init() {
        this.startTimer();
        this.generateLevel();
    }

    startTimer() {
        if (this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => {
            this.timeLeft--;
            const m = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
            const s = (this.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
            if (this.timeLeft <= 0) this.handleFailure("Time Out!");
        }, 1000);
    }

    generateLevel() {
        this.upperSum = 0;
        this.lowerSum = 0;
        this.placedCount = 0;
        document.getElementById('upper-zone').innerHTML = '';
        document.getElementById('lower-zone').innerHTML = '';
        document.getElementById('lv-display').innerText = `Lv. ${this.lv}`;
        this.updateHearts();

        // Puzzle Logic: Create a sum and split it
        let base = 10 + (this.lv * 5);
        let pieces = [];
        
        // Logic for Lv > 5 (Negatives), Lv > 10 (Decimals)
        const generateVal = () => {
            let v = Math.floor(Math.random() * base) + 1;
            if (this.lv > 5 && Math.random() > 0.7) v *= -1;
            if (this.lv > 10 && Math.random() > 0.8) v = parseFloat((v * 0.1).toFixed(1));
            return v;
        };

        let target = generateVal() + generateVal();
        let p1 = generateVal();
        let p2 = target - p1;
        let p3 = generateVal();
        let p4 = target - p3;

        pieces = [p1, p2, p3, p4].sort(() => Math.random() - 0.5);
        this.renderTray(pieces);
    }

    renderTray(pieces) {
        const tray = document.getElementById('tray-container');
        tray.innerHTML = '';
        const configs = [
            {bg: 'bg-tertiary-container', on: 'text-on-tertiary-container', border: 'border-tertiary/20'},
            {bg: 'bg-primary', on: 'text-on-primary', border: 'border-primary-fixed-dim/20'},
            {bg: 'bg-tertiary', on: 'text-on-tertiary', border: 'border-tertiary-fixed-dim/20'},
            {bg: 'bg-secondary-container', on: 'text-on-secondary-container', border: 'border-secondary/20'}
        ];

        pieces.forEach((val, i) => {
            const conf = configs[i % 4];
            const tile = document.createElement('div');
            tile.className = `w-16 h-16 ${conf.bg} rounded-lg flex flex-col items-center justify-center tile-shadow border ${conf.border} cursor-grab active:cursor-grabbing hover:-translate-y-1 transition-transform flex-shrink-0 relative group`;
            tile.innerHTML = `
                <span class="material-symbols-outlined absolute top-1 text-[12px] ${conf.on}/50 group-hover:${conf.on} transition-colors">keyboard_arrow_up</span>
                <span class="font-headline-md text-headline-md ${conf.on} drop-shadow-sm mt-1">${val}</span>
                <span class="material-symbols-outlined absolute bottom-1 text-[12px] ${conf.on}/50 group-hover:${conf.on} transition-colors">keyboard_arrow_down</span>
            `;
            
            this.attachSwipe(tile, val, conf);
            tray.appendChild(tile);
        });
    }

    attachSwipe(el, val, conf) {
        let startY = 0;
        el.addEventListener('touchstart', e => startY = e.touches[0].clientY, {passive: true});
        el.addEventListener('touchend', e => {
            let diff = startY - e.changedTouches[0].clientY;
            if (Math.abs(diff) > 40) {
                this.placeTile(val, diff > 0 ? 'upper' : 'lower', conf);
                el.remove();
            }
        });
    }

    placeTile(val, zone, conf) {
        const container = document.getElementById(`${zone}-zone`);
        const placed = document.createElement('div');
        placed.className = `w-20 h-20 ${zone === 'upper' ? 'bg-primary-container' : 'bg-secondary-container'} rounded-xl flex items-center justify-center tile-shadow border border-white/10 transition-transform`;
        placed.innerHTML = `<span class="font-display-number text-display-number drop-shadow-md">${val}</span>`;
        
        container.appendChild(placed);
        if (zone === 'upper') this.upperSum += val;
        else this.lowerSum += val;

        this.placedCount++;
        if (this.placedCount === 4) this.validate();
    }

    validate() {
        setTimeout(() => {
            if (Math.abs(this.upperSum - this.lowerSum) < 0.01) {
                alert("Equalized!");
                this.lv++;
                this.timeLeft += 15;
                this.generateLevel();
            } else {
                this.handleFailure(`Imbalance: ${this.upperSum} vs ${this.lowerSum}`);
            }
        }, 400);
    }

    updateHearts() {
        const container = document.getElementById('hearts-container');
        container.innerHTML = Array(3).fill(0).map((_, i) => 
            `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' ${i < this.lives ? 1 : 0};">favorite</span>`
        ).join('');
    }

    handleFailure(msg) {
        this.lives--;
        alert(msg);
        if (this.lives <= 0) {
            alert("Game Over!");
            this.lv = 1;
            this.lives = 3;
            this.timeLeft = 60;
        }
        this.generateLevel();
    }
}

window.onload = () => new EqualBlocksEngine();
</script>
</body>
</html>
