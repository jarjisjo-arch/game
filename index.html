<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Equilibrium Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تصميم يحاكي الدفتر والخطوط الصلبة */
        body { 
            background-color: #f0f0f0; 
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }

        .solid-border {
            border: 4px solid #1a1a1a;
            box-shadow: 6px 6px 0px #1a1a1a;
        }

        /* منطقة المادة المضادة مع التظليل المتقاطع (Hatching) كما في رسمك */
        .antimatter-zone {
            background: repeating-linear-gradient(
                45deg,
                #ffffff,
                #ffffff 10px,
                #e5e5e5 10px,
                #e5e5e5 11px
            ), repeating-linear-gradient(
                -45deg,
                #ffffff,
                #ffffff 10px,
                #e5e5e5 10px,
                #e5e5e5 11px
            );
        }

        .tile {
            width: 70px;
            height: 70px;
            background: #ffffff;
            border: 3px solid #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .swiped-up { transform: translateY(-200px) scale(0); opacity: 0; }
        .swiped-down { transform: translateY(200px) scale(0); opacity: 0; }

        .antimatter-tile {
            background: #1a1a1a !important;
            color: #ffffff !important;
            border-color: #000 !important;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4 overflow-hidden">

    <div class="solid-border bg-white p-3 mb-6 flex justify-between items-center">
        <div id="levelDisplay" class="font-black text-xl">LVL: 1</div>
        <div id="livesDisplay" class="text-xl">❤️❤️❤️❤️❤️</div>
    </div>

    <main class="flex-1 flex flex-col gap-4">
        
        <div id="upperZone" class="solid-border bg-white/80 h-40 flex flex-wrap content-center justify-center gap-2 relative">
            <span class="absolute top-1 left-2 text-[10px] font-bold opacity-30">UPPER (MATTER)</span>
        </div>

        <div id="lowerZone" class="solid-border antimatter-zone h-40 flex flex-wrap content-center justify-center gap-2 relative">
            <span class="absolute top-1 left-2 text-[10px] font-bold opacity-30">LOWER (ANTIMATTER)</span>
        </div>

        <div id="inventory" class="solid-border bg-[#e0e0e0] p-4 flex justify-center items-center gap-4 min-h-[120px]">
            </div>

    </main>

    <div class="solid-border bg-white h-12 mt-4 flex items-center justify-center text-xs font-bold opacity-50">
        --- ADVERTISEMENT SPACE ---
    </div>

    <script>
        class GameEngine {
            constructor() {
                this.level = 1;
                this.lives = 5;
                this.init();
            }

            init() {
                this.upperSum = 0;
                this.lowerSum = 0;
                this.placedCount = 0;
                document.getElementById('upperZone').innerHTML = '';
                document.getElementById('lowerZone').innerHTML = '';
                document.getElementById('levelDisplay').innerText = `LVL: ${this.level}`;
                
                this.generateLevel();
            }

            generateLevel() {
                // منطق الحساب: مجموع ثابت يتم تفكيكه لضمان الحل
                let target = 10 + (this.level * 3);
                let p1 = this.decompose(target);
                let p2 = this.decompose(target);
                
                this.currentPieces = [...p1, ...p2].sort(() => Math.random() - 0.5);
                this.renderInventory();
            }

            decompose(total) {
                let a = Math.floor(Math.random() * (total - 1)) + 1;
                // إضافة الأرقام السالبة بعد المرحلة 5
                if (this.level > 5 && Math.random() > 0.4) {
                    let neg = -Math.floor(Math.random() * 10);
                    return [total - neg, neg];
                }
                return [a, total - a];
            }

            // تشفير الأرقام (جذور، تربيع، تكعيب)
            getMathLabel(num) {
                if (num === 0) return 0;
                let abs = Math.abs(num);
                let prob = Math.random();

                // المستوى 20+: تربيع وجذور تربيعية
                if (this.level > 20 && prob > 0.5 && Number.isInteger(Math.sqrt(abs))) {
                    return prob > 0.7 ? `√${abs*abs}` : `${Math.sqrt(abs)}²`;
                }
                // المستوى 50+: تكعيب وجذور تكعيبية
                if (this.level > 50 && prob > 0.4) {
                    let cr = Math.round(Math.pow(abs, 1/3));
                    if (Math.pow(cr, 3) === abs) return `∛${abs*abs*abs}`;
                }
                return num;
            }

            renderInventory() {
                const inv = document.getElementById('inventory');
                inv.innerHTML = '';
                this.currentPieces.forEach(val => {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.innerText = this.getMathLabel(val);
                    this.attachSwipe(tile, val);
                    inv.appendChild(tile);
                });
            }

            attachSwipe(el, val) {
                let startY;
                el.addEventListener('touchstart', e => startY = e.touches[0].clientY);
                
                el.addEventListener('touchend', e => {
                    let endY = e.changedTouches[0].clientY;
                    let diff = startY - endY;

                    if (diff > 80) { // Swipe Up
                        this.executeMove(el, val, 'upper');
                    } else if (diff < -80) { // Swipe Down
                        this.executeMove(el, val, 'lower');
                    }
                });
            }

            executeMove(el, val, zone) {
                if (zone === 'upper') {
                    this.upperSum += val;
                    el.classList.add('swiped-up');
                    setTimeout(() => {
                        el.classList.remove('swiped-up');
                        document.getElementById('upperZone').appendChild(el);
                    }, 200);
                } else {
                    this.lowerSum += val;
                    el.classList.add('swiped-down');
                    setTimeout(() => {
                        el.classList.remove('swiped-down', 'bg-white');
                        el.classList.add('antimatter-tile');
                        document.getElementById('lowerZone').appendChild(el);
                    }, 200);
                }

                this.placedCount++;
                if (this.placedCount === 4) this.validate();
            }

            validate() {
                setTimeout(() => {
                    if (this.upperSum === this.lowerSum) {
                        alert("✨ توازن مطلق! ✨");
                        this.level++;
                    } else {
                        alert("❌ اختلال في المعادلة!");
                        this.lives--;
                    }
                    this.init();
                }, 500);
            }
        }

        // إطلاق اللعبة
        window.onload = () => new GameEngine();
    </script>
</body>
</html>
